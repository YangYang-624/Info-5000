   <g id="text_13">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="26.69184" y="195.561502" transform="rotate(-0 26.69184 195.561502)">Representation upgrade</text>
   </g>
   <g id="text_14">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="31.46112" y="204.186257" transform="rotate(-0 31.46112 204.186257)">- explicit entry, monitor, hold, and tail roles</text>
   </g>
   <g id="text_15">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="31.46112" y="213.476417" transform="rotate(-0 31.46112 213.476417)">- richer staged geometry than the EVTBO family</text>
   </g>
   <g id="text_16">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="31.46112" y="222.766577" transform="rotate(-0 31.46112 222.766577)">- same fixed four-metric contract</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="274.6944" y="195.594315" transform="rotate(-0 274.6944 195.594315)">Search discipline</text>
   </g>
   <g id="text_18">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="279.46368" y="204.186257" transform="rotate(-0 279.46368 204.186257)">- trust-region local search around feasible candidates</text>
   </g>
   <g id="text_19">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="279.46368" y="213.476417" transform="rotate(-0 279.46368 213.476417)">- feasibility-aware ordering before expensive simulation</text>
   </g>
   <g id="text_20">
    <text style="font-size: 7.4px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start; fill: #8a9199" x="279.46368" y="222.766577" transform="rotate(-0 279.46368 222.766577)">- package-level claim, not single-module attribution</text>
   </g>
  </g>
  <g id="text_21">
   <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; text-anchor: start" x="7.2" y="16.318125" transform="rotate(-0 7.2 16.318125)">PSMS-v2 staged protocol representation</text>
  </g>
  <g id="text_22">
   <text style="font-size: 8.5px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; fill: #8a9199" transform="translate(7.2 36.014672)">The gain comes from the richer staged PSMS package and feasibility-aware constrained search,</text>
   <text style="font-size: 8.5px; font-family: 'DejaVu Sans', 'Arial', 'Liberation Sans', sans-serif; fill: #8a9199" transform="translate(7.2 45.532813)">not from any single added component or a tweak to the old three-stage family.</text>
  </g>
 </g>
